  risk: MEDIUM
  reason: "ETF de semiconductores; alta concentración en NVDA, TSMC y pares"
  note: "Apuesta sectorial a chips/IA. Retorno por apreciación; muy concentrado en pocos nombres líderes."

SCHB:
